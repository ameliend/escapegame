<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission 4 - Escape Game</title>
    <link rel="stylesheet" href="assets/css/stylescursor.css">
        <meta http-equiv="refresh" content="url=mission5.html">


</head>
<body>
    <div id="timer-container" aria-live="polite" aria-label="Temps restant">
        <span id="game-timer">30:00</span>
    </div>
    <div>
    <header>
        <div class="banner">
            <div class="banner-image">
                <img src="assets/images/claude.jpg" alt="Claude Chambenoit de la Flamme">
            </div>
            <div class="banner-overlay"></div>
        </div>
        <h1>Mission : Gérer les tremblements de Claude</h1>
    </header>
    <main>

        <p>Claude Chambenoit souhaite aussi t'apporter son aide. Mais à cause de son grand âge, des tremblements vont venir pertuber sa navigation. Aide-la à cliquer sur le bouton.</p>
        <div class="tremblements-target">
            <img src="assets/images/laflamme.jpg" alt="La Flamme" class="tremblements-image">
            <a href="#" id="cliquezIci" class="thecursorbtn" aria-label="Cliquez ici">
                <svg width="14" height="14" viewBox="0 0 60 60" aria-hidden="true">
                    <circle cx="30" cy="30" r="29" fill="black" stroke="white" stroke-width="2"/>
                    <line x1="18" y1="18" x2="42" y2="42" stroke="white" stroke-width="3" stroke-linecap="round"/>
                    <line x1="42" y1="18" x2="18" y2="42" stroke="white" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </a>
        </div>
        <p id="messageBravo" class="bravo-message"></p>
        <div class="thecursor"></div>
    </main>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="assets/js/scriptcursor.js"></script>
    <script src="assets/js/timer.js"></script>

</body>
</html>
